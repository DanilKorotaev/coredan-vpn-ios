name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: macos-latest
    env:
      MIN_COVERAGE: "15"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Cache Libbox.xcframework
        id: libbox-cache
        uses: actions/cache@v4
        with:
          path: ThirdParty/Libbox.xcframework
          key: libbox-${{ hashFiles('scripts/install_libbox.sh') }}-v1.13.12

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Bootstrap project
        run: ./scripts/ci/bootstrap.sh

      - name: Pick iOS Simulator
        run: |
          DEVICE_NAME=$(python3 - <<'PY'
          import subprocess, re, sys
          r = subprocess.run(
              ["xcodebuild", "-showdestinations", "-scheme", "CoreDanVPNApp"],
              capture_output=True,
              text=True,
              cwd=".",
          )
          if r.returncode != 0:
              print("iPhone 16", end="")
              sys.exit(0)
          for line in r.stdout.splitlines():
              if "platform:iOS Simulator" in line and "iPhone" in line:
                  m = re.search(r"name:([^,}]+)", line)
                  if m:
                      print(m.group(1).strip(), end="")
                      sys.exit(0)
          print("iPhone 16", end="")
          PY
          )
          echo "SCAN_DEVICE=$DEVICE_NAME" >> "$GITHUB_ENV"
          echo "Using simulator: $DEVICE_NAME"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests (Fastlane)
        id: tests
        continue-on-error: true
        run: bundle exec fastlane test

      - name: Notify Telegram (tests)
        if: always()
        run: python3 scripts/ci/telegram_notify.py tests --outcome ${{ steps.tests.outcome }}

      - name: Fail if tests failed
        if: steps.tests.outcome != 'success'
        run: exit 1
